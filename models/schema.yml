version: 2

models: 
  - name: stg_transactions
    description: Transaction in the Eth Blockchain
    columns:
      - name: hash
        description: >
          This is very long description of hash key
          which is multiline
        data_tests:
          - unique
          - not_null

  - name: stablecoin_activity_per_day
    latest_version: 1
    config:
      contract:
        enforced: true
    columns:
      - name: date
        data_type: date
        description: ""

      - name: token_address
        data_type: varchar
        description: ""

      - name: type
        data_type: varchar
        description: ""

      - name: symbol
        data_type: varchar
        description: ""

      - name: total_usd_value
        data_type: float
        description: ""

    versions:
    
      - v: 1
        deprecation_date: 2026-06-30
        # Matches what's above -- nothing more needed
    
      - v: 2
        # Removed a column -- this is the breaking change!
        columns:
          # This means: use the 'columns' list from above, but exclude country_name
          - include: all
            exclude: [symbol, token_address]